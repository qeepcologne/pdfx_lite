name: pdfx_lite_example
description: Host app for pdfx_lite — exists to build and drive the plugin on a real device.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  pdfx_lite:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  #pdfx_lite ships as a Swift package with no podspec, so the host app must use SPM to find it.
  config:
    enable-swift-package-manager: true
  assets:
    - assets/hello.pdf
    - assets/rotated90.pdf
    - assets/locked.pdf
    - assets/perms_only.pdf
