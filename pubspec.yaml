name: pdfx_lite
description: Minimal, legacy-free PDF rendering & viewing for Flutter (Android + iOS) — no CocoaPods, SPM-only, no web/desktop renderers. Replacement for pdfx.
repository: https://github.com/qeepcologne/pdfx_lite
version: 3.4.1

environment:
  sdk: ^3.12.0
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.18.0
  synchronized: ^3.4.1
  #`vector_math_64` (Quad/Vector3/Matrix4) for the pinch viewer's transform maths. Flutter pins this to 2.2.0.
  #2.2.0 is the floor, not a preference: `translateByDouble`/`scaleByDouble` do not exist before it.
  vector_math: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  #Codegen only — dev deps are not resolved transitively, so nothing here reaches consumers of the package.
  #Regenerate the bridge with: dart run pigeon --input pigeons/messages.dart
  pigeon: ^27.1.2

flutter:
  plugin:
    platforms:
      android:
        package: io.scer.pdfx
        pluginClass: PdfxPlugin
      ios:
        pluginClass: SwiftPdfxPlugin
