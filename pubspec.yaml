name: pdfx_lite
description: Minimal, legacy-free PDF rendering & viewing for Flutter (Android + iOS) — no CocoaPods, SPM-only, no web/desktop renderers. Replacement for pdfx.
repository: https://github.com/qeepcologne/pdfx_lite
version: 2.9.3

environment:
  sdk: ^3.12.0
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.15.0
  photo_view: ^0.15.0
  plugin_platform_interface: ^2.1.8
  synchronized: ^3.4.1
  #`vector_math_64` (Quad/Vector3/Matrix4) for the pinch viewer's transform maths. Flutter pins this to 2.2.0.
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  #`pigeon` is NOT a dev dependency: v4 pins analyzer 4.x, and the generated files (lib/src/renderer/io/pigeon.dart,
  #android/.../Pigeon.java, ios/.../Messages.swift) are checked in and the message API is frozen. To regenerate, add
  #`pigeon` temporarily and run it against `pigeons/messages.dart`.

flutter:
  plugin:
    platforms:
      android:
        package: io.scer.pdfx
        pluginClass: PdfxPlugin
      ios:
        pluginClass: SwiftPdfxPlugin
